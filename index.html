<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KanbanNG</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="icons/favicon.png">
  <input type="file" id="fileInput" style="display:none" accept=".json">
  <script src="sortjs/Sortable.min.js"></script>
</head>
<body>
  <div class="app-wrapper">
    <aside class="sidebar">
      <div class="sidebar-pill">
        <button class="sidebar-action sidebar-arrow-up" aria-label="Upload">
          <input 
            type="file"
            id="json-input"
            class="json-upload-input"
            accept=".json"
          >
          <svg class="icon" viewBox="0 0 24 24" fill="none">
            <path d="M12 17V3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M6 9l6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="sidebar-action sidebar-arrow-down" type="button" aria-label="Download">
          <svg class="icon" viewBox="0 0 24 24" fill="none">
            <path d="M12 3v14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M18 11l-6 6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </aside>
    <div class="warning-sign-download-please">Data may not be saved always, please download manually.</div>
    <main class="main-content">
      <image class="app-logo" src="icons/websiteicon2.png" alt="KanbanNG Logo" pointer-events="none"/>
      <header class="app-header">
        
        <h1 class="app-title">KanbanNG</h1>

        <div class="project-title">
          <div class="project-title-background">
            <div class="project-title-header" contenteditable="true" data-placeholder="Project title..."></div>
          </div>
        </div>
      </header>
        
      <div class="board">

        <div id="dropzone" class="dropzone hidden">
          Drop files here
          <input type="file" id="fileInput" hidden />
        </div>

        <div class="columns-grid">
          
          <div class="column column-todo">
            <div class="column-header color-todo">To-Do</div>
            <div class="card-list" id="list-todo">
                
            </div>
            <div class="column-footer">
              <button class="add-card-btn" data-column="list-todo" type="button">+  Add new...</button>
            </div>
          </div>

          <div class="column column-inprogress">
            <div class="column-header color-inprogress">In Progress</div>
            <div class="card-list" id="list-inprogress">
                
            </div>
            <div class="column-footer">
              <button class="add-card-btn" data-column="list-inprogress" type="button">+  Add new...</button>
            </div>
          </div>
          <div class="column column-review">
            <div class="column-header color-review">Review</div>
            <div class="card-list" id="list-review"> 
            </div>
            <div class="column-footer">
              <button class="add-card-btn" data-column="list-review" type="button">+  Add new...</button>
            </div>
          </div>
          <div class="column column-done">
            <div class="column-header color-done">Done</div>
            <div class="card-list" id="list-done"></div>
            <div class="column-footer">
              <button class="add-card-btn" data-column="list-done" type="button">+  Add new...</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="info-footer" style="position: absolute; bottom: 0; width: 100%; padding: 10px; text-align: right; right: 7px;">
      <div class="info-footer-div">
        <span class="info-hover">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px;">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 16v-4"/>
            <path d="M12 8h.01"/>
          </svg>
        </span>
        <div class="info-popup">
          <p>Icons by Lucide (https://lucide.dev), ISC</p>
        </div>
      </div>
    </footer>
  <script src="script.js"></script>
  <script src="./sortjs/Sortable.min.js"></script>
</body>
</html>
